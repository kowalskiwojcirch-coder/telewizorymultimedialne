<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sterowanie Telebimem</title>
<style>
body {
  background: black;
  color: #D1A63F;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

textarea {
  width: 80%;
  max-width: 600px;
  height: 100px;
  margin-bottom: 10px;
  background: #111;
  color: #D1A63F;
  border: 2px solid #D1A63F;
  border-radius: 5px;
  font-size: 16px;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  background: #222;
  color: #D1A63F;
  border: 2px solid #D1A63F;
  border-radius: 5px;
  padding: 10px 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #333;
}
</style>
</head>
<body>

<h1>Sterowanie Telebimem</h1>

<textarea id="textInput" placeholder="Wpisz tekst do telebimu..."></textarea>

<div class="controls">
  <button id="prevSlide">⬅ Poprzedni</button>
  <button id="nextSlide">➡ Następny</button>
  <button id="toggleDisplay">Włącz/Wyłącz</button>
  <button id="clearText">Wyczyść</button>
</div>

<script>
// Obsługa LocalStorage
const textInput = document.getElementById("textInput");

// Wczytanie tekstu z LocalStorage
textInput.value = localStorage.getItem("text") || "";

// Aktualizacja tekstu
textInput.addEventListener("input", ()=>{
  localStorage.setItem("text", textInput.value);
});

// Sterowanie slajdami i ekranem
document.getElementById("nextSlide").onclick = ()=>{ localStorage.setItem("nextSlide", Date.now()); }
document.getElementById("prevSlide").onclick = ()=>{ localStorage.setItem("prevSlide", Date.now()); }
document.getElementById("toggleDisplay").onclick = ()=>{ 
  const current = localStorage.getItem("displayOn") === "true";
  localStorage.setItem("displayOn", !current);
}
document.getElementById("clearText").onclick = ()=>{
  localStorage.setItem("text", "");
  textInput.value = "";
  localStorage.setItem("clearText", Date.now());
}
</script>

</body>
</html>
