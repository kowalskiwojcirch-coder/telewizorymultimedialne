<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kontrola Telewizorów</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #222;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
}
textarea {
  width: 600px;
  height: 150px;
  font-size: 18px;
  margin-bottom: 20px;
  padding: 10px;
  border-radius: 6px;
  border: none;
  resize: none;
}
button {
  margin: 5px;
  padding: 10px 20px;
  font-size: 16px;
  background: #D1A63F;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
button:hover {
  background: #b8912f;
}
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
</style>
</head>
<body>
<h2>Kontrola Ekranów</h2>
<textarea id="textInput" placeholder="Wpisz tekst tutaj..."></textarea>
<div class="controls">
  <button onclick="updateText()">Wyślij</button>
  <button onclick="prevSlide()">Poprzedni slajd</button>
  <button onclick="nextSlide()">Następny slajd</button>
  <button onclick="clearText()">Wyczyść</button>
</div>

<script>
const textarea=document.getElementById("textInput");

function updateText(){
  const text=textarea.value;
  localStorage.setItem("text",text);
}

function clearText(){
  textarea.value="";
  localStorage.setItem("text","");
}

function nextSlide(){
  const display=window.open("display.html");
  display.nextSlide();
}

function prevSlide(){
  const display=window.open("display.html");
  display.prevSlide();
}
</script>
</body>
</html>
