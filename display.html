<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Telebim LED</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 10px;
}

.line {
  display: flex;
  gap: 4px;
}

/* jedna litera */
.char {
  display: grid;
  grid-template-columns: repeat(5, 5px);
  grid-template-rows: repeat(7, 5px);
  gap: 0.8px;
}

/* kropka LED OFF */
.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #111;
}

/* LED ON */
.on {
  background: #D1A63F;
  box-shadow: 0 0 2px #D1A63F;
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const ROWS = 10;
const COLS = 20;
const screen = document.getElementById("screen");

// Czcionki 5x7 - duże, małe, cyfry, polskie znaki
const fontBig = {
"A":["01110","10001","10001","11111","10001","10001","10001"],
"Ą":["01110","10001","10001","11111","10001","10101","01010"],
"B":["11110","10001","11110","10001","10001","10001","11110"],
"C":["01111","10000","10000","10000","10000","10000","01111"],
"Ć":["01110","10001","10000","11110","10001","10001","01110"],
"D":["11110","10001","10001","10001","10001","10001","11110"],
"E":["11111","10000","11110","10000","10000","10000","11111"],
"Ę":["11111","10000","11110","10000","10001","10101","01110"],
"F":["11111","10000","11110","10000","10000","10000","10000"],
"G":["01111","10000","10000","10011","10001","10001","01111"],
"H":["10001","10001","11111","10001","10001","10001","10001"],
"I":["11111","00100","00100","00100","00100","00100","11111"],
"J":["00111","00010","00010","00010","10010","10010","01100"],
"K":["10001","10010","10100","11000","10100","10010","10001"],
"L":["10000","10000","10000","10000","10000","10000","11111"],
"Ł":["10001","10000","10000","11110","10000","10000","11110"],
"M":["10001","11011","10101","10101","10001","10001","10001"],
"N":["10001","11001","10101","10011","10001","10001","10001"],
"Ń":["10001","11001","10101","10011","10001","01010","00100"],
"O":["01110","10001","10001","10001","10001","10001","01110"],
"Ó":["01110","10001","10001","10001","10101","10001","01110"],
"P":["11110","10001","10001","11110","10000","10000","10000"],
"Q":["01110","10001","10001","10001","10101","10010","01101"],
"R":["11110","10001","10001","11110","10100","10010","10001"],
"S":["01111","10000","10000","01110","00001","00001","11110"],
"Ś":["01110","10001","10000","01110","00001","00001","01110"],
"T":["11111","00100","00100","00100","00100","00100","00100"],
"U":["10001","10001","10001","10001","10001","10001","01110"],
"W":["10001","10001","10001","10101","10101","10101","01010"],
"Y":["10001","10001","01010","00100","00100","00100","00100"],
"Z":["11111","00010","00100","00100","01000","10000","11111"],
"Ż":["11111","00010","00100","00100","01000","10010","11111"],
"Ź":["11111","00010","00100","00100","01001","10010","11101"],
"0":["01110","10001","10011","10101","11001","10001","01110"],
"1":["00100","01100","00100","00100","00100","00100","01110"],
"2":["01110","10001","00001","00010","00100","01000","11111"],
"3":["11110","00001","00010","00110","00001","10001","01110"],
"4":["00010","00110","01010","10010","11111","00010","00010"],
"5":["11111","10000","11110","00001","00001","10001","01110"],
"6":["00110","01000","10000","11110","10001","10001","01110"],
"7":["11111","00001","00010","00100","01000","01000","01000"],
"8":["01110","10001","10001","01110","10001","10001","01110"],
"9":["01110","10001","10001","01111","00001","00010","01100"],
" ":["00000","00000","00000","00000","00000","00000","00000"],
".":["00000","00000","00000","00000","00000","01100","01100"],
",":["00000","00000","00000","00000","00100","01000","00000"],
"!":["00100","00100","00100","00100","00000","00100","00000"],
"?":["01110","10001","00010","00100","00100","00000","00100"],
"*":["00000","00100","01110","01110","01110","00100","00000"]
};

// Małe litery 5x7
const fontSmall = {
"a":["00000","01110","00001","01111","10001","10001","01111"],
"ą":["00000","01110","00001","01111","10001","10101","01010"],
"b":["10000","10000","11110","10001","10001","10001","11110"],
"c":["00000","01111","10000","10000","10000","10000","01111"],
"ć":["00000","01110","10001","11110","10000","10001","01110"],
"d":["00001","00001","01111","10001","10001","10001","01111"],
"e":["00000","01110","10001","11111","10000","10001","01110"],
"ę":["00000","01110","10001","11111","10000","10101","01110"],
"l":["01100","00100","00100","00100","00100","00100","01110"],
"ł":["01000","01000","01110","01000","01000","01000","01110"],
"n":["00000","11110","10001","10001","10001","10001","10001"],
"ń":["00000","11110","10001","10001","10001","01010","00100"],
"o":["00000","01110","10001","10001","10001","10001","01110"],
"ó":["00000","01110","10001","10001","10101","10001","01110"],
"s":["00000","01111","10000","01110","00001","00001","11110"],
"ś":["00000","01110","10001","01110","00001","00001","01110"],
"z":["00000","11111","00010","00100","01000","10000","11111"],
"ż":["00000","11111","00010","00100","01000","10010","11111"],
"ź":["00000","11111","00010","00100","01001","10010","11101"],
" ":["00000","00000","00000","00000","00000","00000","00000"]
};

// Pobranie macierzy danej litery
function getMatrix(char){
  if(fontBig[char]) return fontBig[char];
  if(fontSmall[char]) return fontSmall[char];
  return fontBig[" "];
}

// Podział tekstu na slajdy wg podwójnego entera
function paginateText(text){
  const lines = text.split("\n");
  const slides = [];
  let slide = [];
  lines.forEach((line,i)=>{
    if(line.trim()=="" && slide.length>0){
      slides.push(slide);
      slide = [];
    } else {
      slide.push(line);
    }
  });
  if(slide.length>0) slides.push(slide);
  return slides;
}

// Render slajdu
function renderSlide(slideLines){
  screen.innerHTML="";
  for(let r=0;r<ROWS;r++){
    const lineDiv=document.createElement("div");
    lineDiv.className="line";
    for(let c=0;c<COLS;c++){
      let char=" ";
      if(slideLines[r]){
        char = slideLines[r][c] || " ";
      }
      const charDiv=document.createElement("div");
      charDiv.className="char";
      const matrix = getMatrix(char);
      matrix.forEach(row=>{
        row.split("").forEach(bit=>{
          const dot=document.createElement("div");
          dot.className="dot";
          if(bit==="1") dot.classList.add("on");
          charDiv.appendChild(dot);
        });
      });
      lineDiv.appendChild(charDiv);
    }
    screen.appendChild(lineDiv);
  }
}

// Gwiazdki w rogach jeśli brak tekstu
function renderEmpty(){
  screen.innerHTML="";
  for(let r=0;r<ROWS;r++){
    const lineDiv=document.createElement("div");
    lineDiv.className="line";
    for(let c=0;c<COLS;c++){
      const charDiv=document.createElement("div");
      charDiv.className="char";
      let char=" ";
      if((r===0||r===ROWS-1)&&(c===0||c===COLS-1)) char="*";
      const matrix = getMatrix(char);
      matrix.forEach(row=>{
        row.split("").forEach(bit=>{
          const dot=document.createElement("div");
          dot.className="dot";
          if(bit==="1") dot.classList.add("on");
          charDiv.appendChild(dot);
        });
      });
      lineDiv.appendChild(charDiv);
    }
    screen.appendChild(lineDiv);
  }
}

// Render całego tekstu z kontrolą przez LocalStorage
let slides=[], currentSlide=0;
function renderText(text){
  if(!text || text.trim()===""){
    renderEmpty();
    return;
  }
  slides = paginateText(text);
  currentSlide = 0;
  renderSlide(slides[currentSlide]);
}

// Nasłuchiwanie LocalStorage
window.addEventListener("storage",(e)=>{
  if(e.key==="text") renderText(e.newValue);
  if(e.key==="nextSlide"){ 
    if(slides.length>0){
      currentSlide=(currentSlide+1)%slides.length;
      renderSlide(slides[currentSlide]);
    }
  }
  if(e.key==="prevSlide"){ 
    if(slides.length>0){
      currentSlide=(currentSlide-1+slides.length)%slides.length;
      renderSlide(slides[currentSlide]);
    }
  }
  if(e.key==="clearText") renderText("");
  if(e.key==="displayOn"){
    const on=e.newValue==="true";
    if(!on) renderEmpty();
    else renderText(localStorage.getItem("text"));
  }
});

// Start
renderText(localStorage.getItem("text"));
</script>

</body>
</html>
