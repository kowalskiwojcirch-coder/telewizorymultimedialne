<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Telebim LED</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px;
}

.line {
  display: flex;
  gap: 4px;
}

/* jedna litera */
.char {
  display: grid;
  grid-template-columns: repeat(5, 6px);
  grid-template-rows: repeat(8, 6px);
  gap: 1px;
}

/* kropka LED OFF */
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;  /* prawdziwe kółko */
  background: #111;
}

/* LED ON */
.on {
  background: #D1A63F;
  box-shadow: 0 0 4px #D1A63F;
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const ROWS = 10;
const COLS = 20;

const screen = document.getElementById("screen");

// DUŻE litery
const fontBig = {
"A":["01110","10001","10001","11111","10001","10001","10001"],
"B":["11110","10001","11110","10001","10001","10001","11110"],
"C":["01111","10000","10000","10000","10000","10000","01111"],
"E":["11111","10000","11110","10000","10000","10000","11111"],
"L":["10000","10000","10000","10000","10000","10000","11111"],
"O":["01110","10001","10001","10001","10001","10001","01110"],
"S":["01111","10000","10000","01110","00001","00001","11110"],
"Z":["11111","00010","00100","00100","01000","10000","11111"],
" ":["00000","00000","00000","00000","00000","00000","00000"]
};

// MAŁE litery
const fontSmall = {
"a":["00000","01110","00001","01111","10001","10001","01111"],
"e":["00000","01110","10001","11111","10000","10001","01110"],
"i":["00100","00000","01100","00100","00100","00100","01110"],
"m":["00000","11010","10101","10101","10101","10101","10101"],
"n":["00000","11110","10001","10001","10001","10001","10001"],
"o":["00000","01110","10001","10001","10001","10001","01110"],
"w":["00000","10001","10001","10101","10101","10101","01010"],
"y":["00000","10001","10001","01111","00001","00010","11100"],
"z":["00000","11111","00010","00100","01000","10000","11111"],
" ":["00000","00000","00000","00000","00000","00000","00000"]
};

// polskie znaki
const polish = {"ą":"a","ć":"c","ę":"e","ł":"l","ń":"n","ó":"o","ś":"s","ż":"z","ź":"z"};

function getMatrix(char){
    if(polish[char]) char=polish[char];
    if(char===char.toLowerCase()) return fontSmall[char] || fontSmall[" "];
    return fontBig[char] || fontBig[" "];
}

function paginateText(text){
    const chars = text.split("");
    const pages = [];
    while(chars.length){
        pages.push(chars.splice(0, ROWS*COLS));
    }
    return pages;
}

function renderPage(pageChars){
    screen.innerHTML = "";
    for(let r=0;r<ROWS;r++){
        const line = document.createElement("div");
        line.className="line";
        for(let c=0;c<COLS;c++){
            const char = pageChars[r*COLS + c] || " ";
            const charDiv=document.createElement("div");
            charDiv.className="char";
            const matrix=getMatrix(char);
            matrix.forEach(row=>{
                row.split("").forEach(bit=>{
                    const dot=document.createElement("div");
                    dot.className="dot";
                    if(bit==="1") dot.classList.add("on");
                    charDiv.appendChild(dot);
                });
            });
            line.appendChild(charDiv);
        }
        screen.appendChild(line);
    }
}

function renderText(text){
    const pages = paginateText(text);
    let current = 0;
    renderPage(pages[current]);
    if(pages.length>1){
        setInterval(()=>{
            current=(current+1)%pages.length;
            renderPage(pages[current]);
        },2500);
    }
}

// start
renderText(localStorage.getItem("text") || "Pan z wami i z duchem twoim. Zażółć gęślą jaźń.");
window.addEventListener("storage",(e)=>{
    if(e.key==="text") renderText(e.newValue);
});
</script>

</body>
</html>
