<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Telebim LED</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px;
}

.line {
  display: flex;
  gap: 4px;
}

.char {
  display: grid;
  grid-template-columns: repeat(5, 5px);
  grid-template-rows: repeat(7, 5px);
  gap: 0.8px;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #111;
}

.on {
  background: #D1A63F;
  box-shadow: 0 0 2px #D1A63F;
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const ROWS = 10;
const COLS = 20;
const screen = document.getElementById("screen");

// Font LED z polskimi znakami i gwiazdką
const fontBig = {
  "A":["01110","10001","10001","11111","10001","10001","10001"],
  "Ą":["01110","10001","10001","11111","10001","10101","01010"],
  "B":["11110","10001","11110","10001","10001","10001","11110"],
  "C":["01111","10000","10000","10000","10000","10000","01111"],
  "Ć":["01110","10001","10000","11110","10001","10001","01110"],
  "D":["11110","10001","10001","10001","10001","10001","11110"],
  "E":["11111","10000","11110","10000","10000","10000","11111"],
  "Ę":["11111","10000","11110","10000","10001","10101","01110"],
  "F":["11111","10000","11110","10000","10000","10000","10000"],
  "G":["01111","10000","10000","10011","10001","10001","01111"],
  "H":["10001","10001","11111","10001","10001","10001","10001"],
  "I":["11111","00100","00100","00100","00100","00100","11111"],
  "J":["00111","00010","00010","00010","10010","10010","01100"],
  "K":["10001","10010","10100","11000","10100","10010","10001"],
  "L":["10000","10000","10000","10000","10000","10000","11111"],
  "Ł":["10001","10000","10000","11110","10000","10000","11110"],
  "M":["10001","11011","10101","10101","10001","10001","10001"],
  "N":["10001","11001","10101","10011","10001","10001","10001"],
  "Ń":["10001","11001","10101","10011","10001","01010","00100"],
  "O":["01110","10001","10001","10001","10001","10001","01110"],
  "Ó":["01110","10001","10001","10001","10101","10001","01110"],
  "P":["11110","10001","10001","11110","10000","10000","00000"],
  "Q":["01110","10001","10001","10001","10101","10010","01101"],
  "R":["11110","10001","10001","11110","10100","10010","10001"],
  "S":["01111","10000","10000","01110","00001","00001","11110"],
  "Ś":["01110","10001","10000","01110","00001","00001","01110"],
  "T":["11111","00100","00100","00100","00100","00100","00100"],
  "U":["10001","10001","10001","10001","10001","10001","01110"],
  "W":["10001","10001","10001","10101","10101","10101","01010"],
  "Y":["10001","10001","01010","00100","00100","00100","00100"],
  "Z":["11111","00010","00100","00100","01000","10000","11111"],
  "Ż":["11111","00010","00100","00100","01000","10010","11111"],
  "Ź":["11111","00010","00100","00100","01001","10010","11101"],
  "*":["10001","01010","00100","01010","10001","00000","00000"],
  " ":["00000","00000","00000","00000","00000","00000","00000"],
  ".":["00000","00000","00000","00000","00000","01100","01100"],
  ",":["00000","00000","00000","00000","00100","01000","00000"],
  "!":["00100","00100","00100","00100","00000","00100","00000"],
  "?":["01110","10001","00010","00100","00100","00000","00100"]
};

function getMatrix(char){
  return fontBig[char] || fontBig[" "];
}

// Podział tekstu na slajdy (2 Enter → nowy slajd)
function paginateText(text){
  const slides = [];
  const rawSlides = text.split(/\n{2,}/); // dwa lub więcej Enter → nowy slajd
  rawSlides.forEach(slideText=>{
    const chars = [];
    slideText.split("\n").forEach(line=>{
      for(let i=0;i<line.length;i++){
        chars.push(line[i]);
      }
      while(chars.length % COLS !==0) chars.push(" ");
    });
    slides.push(chars);
  });
  return slides;
}

// Render jednej strony
function renderPage(chars){
  screen.innerHTML="";
  for(let r=0;r<ROWS;r++){
    const line = document.createElement("div");
    line.className="line";
    for(let c=0;c<COLS;c++){
      const char = chars[r*COLS+c] || " ";
      const charDiv = document.createElement("div");
      charDiv.className="char";
      const matrix = getMatrix(char);
      matrix.forEach(row=>{
        row.split("").forEach(bit=>{
          const dot = document.createElement("div");
          dot.className="dot";
          if(bit==="1") dot.classList.add("on");
          charDiv.appendChild(dot);
        });
      });
      line.appendChild(charDiv);
    }
    screen.appendChild(line);
  }
}

// Render całego tekstu
function renderText(text){
  if(!text || text.trim()===""){
    const empty = Array(ROWS*COLS).fill(" ");
    empty[0]="*";               // górny lewy
    empty[COLS-1]="*";          // górny prawy
    empty[ROWS*COLS-COLS]="*";  // dolny lewy
    empty[ROWS*COLS-1]="*";      // dolny prawy
    renderPage(empty);
    return;
  }

  const slides = paginateText(text);
  let current=0;
  renderPage(slides[current]);

  if(slides.length>1){
    setInterval(()=>{
      current=(current+1)%slides.length;
      renderPage(slides[current]);
    }, 2500);
  }
}

// Start
renderText(localStorage.getItem("text") || "");
window.addEventListener("storage",e=>{
  if(e.key==="text") renderText(e.newValue);
});
</script>

</body>
</html>
