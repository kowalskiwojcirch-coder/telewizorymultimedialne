<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Telebim LED</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen {
  display: flex;
  flex-direction: column;
  gap: 5px; /* trochę większy odstęp między liniami */
  padding: 10px;
}

.line {
  display: flex;
  gap: 4px;
}

/* jedna litera */
.char {
  display: grid;
  grid-template-columns: repeat(5, 5px);
  grid-template-rows: repeat(7, 5px);
  gap: 0.8px;
}

/* kropka LED OFF */
.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #111;
}

/* LED ON */
.on {
  background: #D1A63F;
  box-shadow: 0 0 2px #D1A63F;
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const ROWS = 10;
const COLS = 20;
const screen = document.getElementById("screen");

// DUŻE litery 5x7 z poprawionymi polskimi znakami
const fontBig = {
  "A":["01110","10001","10001","11111","10001","10001","10001"],
  "Ą":["01110","10001","10001","11111","10001","10101","01010"],
  "E":["11111","10000","11110","10000","10000","10000","11111"],
  "Ę":["11111","10000","11110","10000","10001","10101","01110"],
  "L":["10000","10000","10000","10000","10000","10000","11111"],
  "Ł":["10001","10000","10000","11110","10000","10000","11110"],
  "O":["01110","10001","10001","10001","10001","10001","01110"],
  "Ó":["01110","10001","10001","10001","10101","10001","01110"],
  "S":["01111","10000","10000","01110","00001","00001","11110"],
  "Ś":["01110","10001","10000","01110","00001","00001","01110"],
  "N":["10001","11001","10101","10011","10001","10001","10001"],
  "Ń":["10001","11001","10101","10011","10001","01010","00100"],
  "Z":["11111","00010","00100","00100","01000","10000","11111"],
  "Ż":["11111","00010","00100","00100","01000","10010","11111"],
  "Ź":["11111","00010","00100","00100","01001","10010","11101"],
  " ":["00000","00000","00000","00000","00000","00000","00000"],
  ".":["00000","00000","00000","00000","00000","01100","01100"],
  ",":["00000","00000","00000","00000","00100","01000","00000"],
  "!":["00100","00100","00100","00100","00000","00100","00000"],
  "?":["01110","10001","00010","00100","00100","00000","00100"]
};

// MAŁE litery 5x7 z poprawionymi polskimi znakami
const fontSmall = {
  "a":["00000","01110","00001","01111","10001","10001","01111"],
  "ą":["00000","01110","00001","01111","10001","10101","01010"],
  "e":["00000","01110","10001","11111","10000","10001","01110"],
  "ę":["00000","01110","10001","11111","10000","10101","01110"],
  "l":["01100","00100","00100","00100","00100","00100","01110"],
  "ł":["01000","01000","01110","01000","01000","01000","01110"],
  "n":["00000","11110","10001","10001","10001","10001","10001"],
  "ń":["00000","11110","10001","10001","10001","01010","00100"],
  "o":["00000","01110","10001","10001","10001","10001","01110"],
  "ó":["00000","01110","10001","10001","10101","10001","01110"],
  "s":["00000","01111","10000","01110","00001","00001","11110"],
  "ś":["00000","01110","10001","01110","00001","00001","01110"],
  "z":["00000","11111","00010","00100","01000","10000","11111"],
  "ż":["00000","11111","00010","00100","01000","10010","11111"],
  "ź":["00000","11111","00010","00100","01001","10010","11101"],
  " ":["00000","00000","00000","00000","00000","00000","00000"]
};

// Pobranie macierzy danej litery
function getMatrix(char){
  if(fontBig[char]) return fontBig[char];
  if(fontSmall[char]) return fontSmall[char];
  return fontBig[" "];
}

// Podział tekstu na strony
function paginateText(text){
  const chars = text.split("");
  const pages = [];
  while(chars.length){
    pages.push(chars.splice(0, ROWS * COLS));
  }
  return pages;
}

// Render jednej strony
function renderPage(pageChars){
  screen.innerHTML = "";
  for(let r=0; r<ROWS; r++){
    const line = document.createElement("div");
    line.className="line";
    for(let c=0; c<COLS; c++){
      const char = pageChars[r*COLS + c] || " ";
      const charDiv = document.createElement("div");
      charDiv.className="char";
      const matrix = getMatrix(char);
      matrix.forEach(row => {
        row.split("").forEach(bit => {
          const dot = document.createElement("div");
          dot.className="dot";
          if(bit==="1") dot.classList.add("on");
          charDiv.appendChild(dot);
        });
      });
      line.appendChild(charDiv);
    }
    screen.appendChild(line);
  }
}

// Render całego tekstu
function renderText(text){
  const pages = paginateText(text);
  let current=0;
  renderPage(pages[current]);
  if(pages.length>1){
    setInterval(()=>{
      current=(current+1)%pages.length;
      renderPage(pages[current]);
    },2500);
  }
}

// Start
renderText(localStorage.getItem("text") || "Pan z wami i z duchem twoim. Zażółć gęślą jaźń.");
window.addEventListener("storage", e=>{
  if(e.key==="text") renderText(e.newValue);
});
</script>

</body>
</html>
