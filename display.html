<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Telebim LED</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 10px;
}

.line {
  display: flex;
  gap: 4px;
}

.char {
  display: grid;
  grid-template-columns: repeat(5, 5px);
  grid-template-rows: repeat(7, 5px);
  gap: 0.8px;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #111;
}

.on {
  background: #D1A63F;
  box-shadow: 0 0 2px #D1A63F;
}
</style>
</head>
<body>
<div class="screen" id="screen"></div>

<script>
const ROWS=10;
const COLS=20;
const screen=document.getElementById("screen");

// Czcionki z polskimi znakami i cyframi
// ... Tutaj wklej wszystkie fontBig i fontSmall z poprzedniego skryptu, z poprawionymi polskimi znakami ...

// Pobranie macierzy litery
function getMatrix(char){
  if(fontBig[char]) return fontBig[char];
  if(fontSmall[char]) return fontSmall[char];
  return fontBig[" "];
}

// Podział tekstu na slajdy
function paginateText(text){
  const lines=text.split("\n\n"); // dwa entery -> nowy slajd
  const pages=[];
  lines.forEach(lineBlock=>{
    const chars=lineBlock.replace(/\n/g," ").split("");
    while(chars.length) pages.push(chars.splice(0,ROWS*COLS));
  });
  return pages;
}

// Render pustego ekranu z 4 x w rogach
function renderEmpty(){
  screen.innerHTML="";
  for(let r=0;r<ROWS;r++){
    const lineDiv=document.createElement("div");
    lineDiv.className="line";
    for(let c=0;c<COLS;c++){
      const charDiv=document.createElement("div");
      charDiv.className="char";
      let char=" ";
      if((r===0||r===ROWS-1)&&(c===0||c===COLS-1)) char="x";
      getMatrix(char).forEach(row=>{
        row.split("").forEach(bit=>{
          const dot=document.createElement("div");
          dot.className="dot";
          if(bit==="1") dot.classList.add("on");
          charDiv.appendChild(dot);
        });
      });
      lineDiv.appendChild(charDiv);
    }
    screen.appendChild(lineDiv);
  }
}

// Render pojedynczej strony
function renderPage(pageChars){
  screen.innerHTML="";
  for(let r=0;r<ROWS;r++){
    const line=document.createElement("div");
    line.className="line";
    for(let c=0;c<COLS;c++){
      const char=pageChars[r*COLS+c]||" ";
      const charDiv=document.createElement("div");
      charDiv.className="char";
      getMatrix(char).forEach(row=>{
        row.split("").forEach(bit=>{
          const dot=document.createElement("div");
          dot.className="dot";
          if(bit==="1") dot.classList.add("on");
          charDiv.appendChild(dot);
        });
      });
      line.appendChild(charDiv);
    }
    screen.appendChild(line);
  }
}

// Render całego tekstu
function renderText(text){
  if(!text) return renderEmpty();
  const pages=paginateText(text);
  let current=0;
  renderPage(pages[current]);
  window.currentSlide=current;
  window.slides=pages;
}

// Sterowanie slajdami
window.nextSlide=function(){
  if(!window.slides) return;
  window.currentSlide=(window.currentSlide+1)%window.slides.length;
  renderPage(window.slides[window.currentSlide]);
}
window.prevSlide=function(){
  if(!window.slides) return;
  window.currentSlide=(window.currentSlide-1+window.slides.length)%window.slides.length;
  renderPage(window.slides[window.currentSlide]);
}

// Start
renderText(localStorage.getItem("text"));
window.addEventListener("storage",e=>{
  if(e.key==="text") renderText(e.newValue);
});
</script>
</body>
</html>
