<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Telebim LED</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.screen {
  display: flex;
  flex-direction: column;
  gap: 5px; /* odstęp między liniami */
  padding: 10px;
}

.line {
  display: flex;
  gap: 4px;
}

/* jedna litera */
.char {
  display: grid;
  grid-template-columns: repeat(5, 5px);
  grid-template-rows: repeat(7, 5px);
  gap: 0.8px;
}

/* kropka LED OFF */
.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #111;
}

/* LED ON */
.on {
  background: #D1A63F;
  box-shadow: 0 0 2px #D1A63F;
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

const COLS = 20;
const screen = document.getElementById("screen");

// Pobranie macierzy danej litery
function getMatrix(char){
  if(fontBig[char]) return fontBig[char];
  if(fontSmall[char.toLowerCase()]) return fontSmall[char.toLowerCase()];
  return fontBig[" "];
}

// Podział tekstu na strony z obsługą Enter (\n)
function paginateText(text){
  const lines = text.split("\n");
  const pages = [];
  let buffer = [];
  for(const line of lines){
    const chars = line.split("");
    for(const ch of chars) buffer.push(ch);
    // wypełnij linię enterem jeśli krótsza
    buffer.push("\n"); 
  }
  while(buffer.length){
    pages.push(buffer.splice(0, ROWS * COLS));
  }
  return pages;
}

// Render jednej strony
function renderPage(pageChars){
  screen.innerHTML = "";
  for(let r=0; r<ROWS; r++){
    const line = document.createElement("div");
    line.className="line";
    for(let c=0; c<COLS; c++){
      const char = pageChars[r*COLS + c] || " ";
      if(char === "\n") continue; // enter = nowa linia
      const charDiv = document.createElement("div");
      charDiv.className="char";
      const matrix = getMatrix(char);
      matrix.forEach(row => {
        row.split("").forEach(bit => {
          const dot = document.createElement("div");
          dot.className="dot";
          if(bit==="1") dot.classList.add("on");
          charDiv.appendChild(dot);
        });
      });
      line.appendChild(charDiv);
    }
    screen.appendChild(line);
  }
}

// Render całego tekstu
function renderText(text){
  const pages = paginateText(text);
  let current=0;
  renderPage(pages[current]);
  if(pages.length>1){
    setInterval(()=>{
      current=(current+1)%pages.length;
      renderPage(pages[current]);
    },2500);
  }
}

// Start
renderText(localStorage.getItem("text") || "Amen\nPan z wami i z duchem twoim.\nZażółć gęślą jaźń.");
window.addEventListener("storage", e=>{
  if(e.key==="text") renderText(e.newValue);
});
</script>

</html>
